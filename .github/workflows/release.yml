name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Release & Homebrew
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build release artifacts
        run: make release

      - name: Extract changelog for version
        run: |
          awk -v ver="${{ github.ref_name }}" '
            BEGIN { found=0 }
            $0 ~ "^## \\[" ver "\\]" { found=1; print; next }
            found && $0 ~ "^## \\[" { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" dist/*.tar.gz dist/checksums.txt \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate Homebrew formula
        run: |
          chmod +x .github/scripts/generate-formula.sh
          .github/scripts/generate-formula.sh "${{ github.ref_name }}" > /tmp/waveloom.rb

      - name: Push formula to homebrew-tap
        if: ${{ vars.HOMEBREW_TAP_REPO != '' }}
        continue-on-error: true
        run: |
          git clone \
            "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/${{ vars.HOMEBREW_TAP_REPO }}.git" \
            /tmp/tap
          mkdir -p /tmp/tap/Formula
          cp /tmp/waveloom.rb /tmp/tap/Formula/waveloom.rb
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/waveloom.rb
          git diff --cached --quiet || git commit -m "waveloom ${{ github.ref_name }}"
          git push
